name: Deploy Hugo to GitHub Pages

on:
  push:
    branches:
      - main          # triggers on every push to main

  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      # 1. Checkout your repo including the theme submodule
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls in themes/hello-4s3ti
          fetch-depth: 0          # needed for LastModDisplay to work correctly

      # 2. Install Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true          # required by most themes

      # 3. Build the site
      - name: Build
        run: hugo --minify         # minify = smaller, faster output

      # 4. Upload the built site as an artifact for the deploy job
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public           # Hugo outputs here by default

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
